services:
  barrel:
    build:
      context: services/barrel
      args:
        BARREL_BASE_IMAGE: ${BARREL_BASE_IMAGE}
        PHP_CONFIG_MODE: ${PHP_CONFIG_MODE}
        CONTENT_SECURITY_POLICY: ${CONTENT_SECURITY_POLICY}
        IIP_SERVER_ENABLED: ${IIP_SERVER_ENABLED}

    logging:
      driver: none
    
    restart: always
    hostname: ${WISSKI_HOSTNAME}

    labels:
      - "traefik.enable=True"
      - "eu.wiss-ki.barrel.distillery=${DOCKER_NETWORK_NAME}"

      - "traefik.http.routers.wisski_${SLUG}.rule=${HOST_RULE}"
      - "traefik.http.routers.wisski_${SLUG}.tls=${HTTPS_ENABLED}"
      - "traefik.http.routers.wisski_${SLUG}.tls.certresolver=distillery"
      - "traefik.http.services.wisski_${SLUG}.loadbalancer.server.port=8080"
      # more stuff added dynamically ...

    
    volumes:
      - ${RUNTIME_DIR}:/runtime:ro
      - ${DATA_PATH}/.composer:/var/www/.composer:rw
      - ${DATA_PATH}/data:/var/www/data:rw
      - ${DATA_PATH}/home:/var/www:rw
      - ${DATA_PATH}/hostkeys:/ssh/hostkeys:rw
      - ${LOCAL_SETTINGS_PATH}:${LOCAL_SETTINGS_MOUNT}:ro
      - ${PHP_INI_PATH}:${PHP_INI_MOUNT}:ro
    
    networks:
      - distillery
      - default
 
    depends_on:
      # dynamic update based on configuration
      - dedicatedsql
      - dedicatedtriplestore

  dedicatedsql:
    # dedicated sql server, removed when not needed
    image: mariadb:11.8
    restart: always
    cpus: 1.0
    volumes:
        - "${SQL_PATH}/data:/var/lib/mysql"
        - "${SQL_PATH}/config/conf.d/:/etc/mysql/conf.d:ro"
        - "${SQL_PATH}/imports/:/imports/"
    environment:
        # This combination of environment variables will configure a passwordless root user
        # that can only connect to the container from 'localhost'.
        # This means we can only connect using 'docker-compose exec sql mysql -C '...' '. 
        - "MYSQL_ALLOW_EMPTY_PASSWORD=yes"
        - "MYSQL_ROOT_HOST=localhost"
    networks:
      - default

  dedicatedtriplestore:
    build:
      # dedicated triplestore, removed when not needed
      context: services/triplestore
      args:
        RDF4J_VERSION: 5.2.2-tomcat
    restart: always
    cpus: 1.0
    environment:
      RDF4J_REPOSITORY: ""
      JAVA_OPTS: "-Xms1g -Xmx4g"
    volumes:
      - ${TS_PATH}/data:/var/rdf4j:rw
      - ${TS_PATH}/logs:/var/rdf4j/server/logs:rw
    networks:
      - default 
    healthcheck:
      test: ["CMD", "/bin/bash", "/healthcheck.sh"]
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3

networks:
  default:
  distillery:
    name: ${DOCKER_NETWORK_NAME}
    external: true

